<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ボール転がしゲーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    #ui {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 12px;
      color: #fff;
      font-size: 18px;
    }

    #ui span strong {
      color: #ffd700;
      font-size: 22px;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.8; }
    #clearBtn  { background: #e94560; color: #fff; }
    #undoBtn   { background: #4a90d9; color: #fff; }

    #canvas {
      border: 2px solid #2a3a5c;
      border-radius: 10px;
      cursor: crosshair;
      display: block;
      width: min(96vw, 960px);
      height: auto;
      max-height: 78vh;
      touch-action: none;
      box-shadow: 0 0 30px rgba(78,205,196,0.15);
    }

    #msg {
      margin-top: 10px;
      color: #aaa;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-align: center;
    }

    @media (max-width: 820px) {
      #ui {
        gap: 10px;
        font-size: 15px;
        margin-bottom: 8px;
      }

      #ui span strong {
        font-size: 18px;
      }

      button {
        padding: 8px 12px;
        font-size: 14px;
      }

      #msg {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<div id="ui">
  <span>スコア: <strong id="scoreEl">0</strong></span>
  <span>ステージ: <strong id="stageEl">1</strong></span>
  <span>ミス: <strong id="missEl">0</strong></span>
  <button id="undoBtn">↩ 1本戻す</button>
  <button id="clearBtn">🗑 全消し</button>
</div>

<canvas id="canvas" width="960" height="540"></canvas>
<p id="msg">マウスをドラッグして線を引き、ボールをゴールへ転がそう！</p>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreEl');
const stageEl = document.getElementById('stageEl');
const missEl  = document.getElementById('missEl');

let score = 0, miss = 0, stage = 1;
let lines = [];
let balls = [];
let particles = [];
let isDrawing = false;
let drawStart = null;
let drawCurrent = null;

/* ─── ゴール ─────────────────────────── */
const GOAL_W = 140;
const GOAL_H = 28;
const goalSpots = [
  { x: 40, y: 495 },
  { x: 240, y: 495 },
  { x: 430, y: 495 },
  { x: 620, y: 495 },
  { x: 810, y: 495 },
  { x: 140, y: 460 },
  { x: 370, y: 460 },
  { x: 590, y: 460 },
  { x: 780, y: 460 },
  { x: 430, y: 425 }
];
let goalSpotIndex = 2;
let GOAL = { x: goalSpots[goalSpotIndex].x, y: goalSpots[goalSpotIndex].y, w: GOAL_W, h: GOAL_H };

function updateStageAndGoal() {
  const nextStage = Math.floor(score / 10) + 1;
  if (nextStage <= stage) return;

  stage = nextStage;
  stageEl.textContent = stage;

  goalSpotIndex = (goalSpotIndex + 1) % goalSpots.length;
  const nextSpot = goalSpots[goalSpotIndex];
  GOAL = { x: nextSpot.x, y: nextSpot.y, w: GOAL_W, h: GOAL_H };
}

/* ─── パーティクル ─────────────────────── */
function spawnParticles(x, y, color) {
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      color,
      r: 3 + Math.random() * 4
    });
  }
}

/* ─── ボール クラス ────────────────────── */
const BALL_RADIUS = 13;
const GRAVITY     = 0.35;
const FRICTION    = 0.988;
const RESTITUTION = 0.42;

class Ball {
  constructor() {
    this.x  = 60 + Math.random() * (canvas.width - 120);
    this.y  = -BALL_RADIUS;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = 0;
    this.r  = BALL_RADIUS;
    this.active = true;
    this.hue = Math.floor(Math.random() * 360);
    this.color = `hsl(${this.hue},85%,60%)`;
  }

  update() {
    if (!this.active) return;

    this.vy += GRAVITY;
    this.vx *= FRICTION;
    this.x  += this.vx;
    this.y  += this.vy;

    /* 壁 */
    if (this.x - this.r < 0) {
      this.x = this.r;
      this.vx = Math.abs(this.vx) * 0.7;
    }
    if (this.x + this.r > canvas.width) {
      this.x = canvas.width - this.r;
      this.vx = -Math.abs(this.vx) * 0.7;
    }

    /* 線との衝突 */
    for (const ln of lines) collideSegment(this, ln);

    /* ゴール判定 */
    if (
      this.y + this.r > GOAL.y &&
      this.y - this.r < GOAL.y + GOAL.h &&
      this.x > GOAL.x + 6 &&
      this.x < GOAL.x + GOAL.w - 6
    ) {
      const goalYOnHit = GOAL.y;
      this.active = false;
      score++;
      scoreEl.textContent = score;
      updateStageAndGoal();
      spawnParticles(this.x, goalYOnHit, this.color);
    }

    /* 画面外（下） */
    if (this.y - this.r > canvas.height) {
      this.active = false;
      miss++;
      missEl.textContent = miss;
    }
  }

  draw() {
    if (!this.active) return;
    ctx.save();
    ctx.shadowColor  = this.color;
    ctx.shadowBlur   = 14;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);

    /* グラデーション */
    const grd = ctx.createRadialGradient(
      this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
      this.x, this.y, this.r
    );
    grd.addColorStop(0, `hsl(${this.hue},90%,80%)`);
    grd.addColorStop(1, `hsl(${this.hue},85%,40%)`);

    ctx.fillStyle = grd;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }
}

/* ─── 線分との衝突検出 ──────────────────── */
function collideSegment(ball, ln) {
  const dx = ln.x2 - ln.x1;
  const dy = ln.y2 - ln.y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return;

  const t = Math.max(0, Math.min(1,
    ((ball.x - ln.x1) * dx + (ball.y - ln.y1) * dy) / len2
  ));
  const cx = ln.x1 + t * dx;
  const cy = ln.y1 + t * dy;
  const ex = ball.x - cx;
  const ey = ball.y - cy;
  const dist = Math.sqrt(ex * ex + ey * ey);

  if (dist < ball.r && dist > 0) {
    const nx = ex / dist;
    const ny = ey / dist;

    /* 押し出し */
    const overlap = ball.r - dist;
    ball.x += nx * overlap;
    ball.y += ny * overlap;

    /* 反射 */
    const dot = ball.vx * nx + ball.vy * ny;
    if (dot < 0) {
      ball.vx -= (1 + RESTITUTION) * dot * nx;
      ball.vy -= (1 + RESTITUTION) * dot * ny;
      ball.vx *= 0.96;
      ball.vy *= 0.96;
    }
  }
}

/* ─── 線を描画 ──────────────────────────── */
function drawLines() {
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 7;

  for (const ln of lines) {
    ctx.beginPath();
    ctx.moveTo(ln.x1, ln.y1);
    ctx.lineTo(ln.x2, ln.y2);
    ctx.strokeStyle = '#4ecdc4';
    ctx.shadowColor  = '#4ecdc4';
    ctx.shadowBlur   = 8;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  /* 描画中のプレビュー */
  if (isDrawing && drawStart && drawCurrent) {
    ctx.beginPath();
    ctx.moveTo(drawStart.x, drawStart.y);
    ctx.lineTo(drawCurrent.x, drawCurrent.y);
    ctx.strokeStyle = 'rgba(78,205,196,0.45)';
    ctx.lineWidth   = 7;
    ctx.shadowBlur  = 0;
    ctx.stroke();
  }
}

/* ─── ゴール描画 ────────────────────────── */
function drawGoal() {
  const { x, y, w, h } = GOAL;

  /* 内側 */
  ctx.fillStyle = 'rgba(255,215,0,0.18)';
  ctx.fillRect(x + 6, y, w - 12, h);

  /* ゴール枠 */
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth   = 4;
  ctx.shadowColor  = '#ffd700';
  ctx.shadowBlur   = 12;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + h);
  ctx.moveTo(x + w, y);
  ctx.lineTo(x + w, y + h);
  ctx.moveTo(x, y);
  ctx.lineTo(x + w, y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  /* ラベル */
  ctx.fillStyle   = '#ffd700';
  ctx.font        = 'bold 15px Arial';
  ctx.textAlign   = 'center';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur  = 8;
  ctx.fillText('⚽ GOAL', x + w / 2, y + h - 5);
  ctx.shadowBlur  = 0;
  ctx.textAlign   = 'left';
}

/* ─── パーティクル描画 ────────────────────── */
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.12;
    p.life -= 0.028;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 6;
    ctx.fill();
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }
}

/* ─── マウスイベント ────────────────────── */
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY
  };
}

canvas.addEventListener('mousedown', e => {
  isDrawing   = true;
  drawStart   = getPos(e);
  drawCurrent = { ...drawStart };
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  drawCurrent = getPos(e);
});

function endDraw() {
  if (isDrawing && drawStart && drawCurrent) {
    const dx = drawCurrent.x - drawStart.x;
    const dy = drawCurrent.y - drawStart.y;
    if (dx * dx + dy * dy > 100) {
      lines.push({ x1: drawStart.x, y1: drawStart.y, x2: drawCurrent.x, y2: drawCurrent.y });
    }
  }
  isDrawing   = false;
  drawStart   = null;
  drawCurrent = null;
}

canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);

/* タッチ対応 */
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  isDrawing = true;
  drawStart = getPos(e.touches[0]);
  drawCurrent = { ...drawStart };
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDrawing) return;
  drawCurrent = getPos(e.touches[0]);
}, { passive: false });

canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(); }, { passive: false });

/* ─── ボタン ──────────────────────────── */
document.getElementById('clearBtn').addEventListener('click', () => { lines = []; });
document.getElementById('undoBtn').addEventListener('click', () => { lines.pop(); });

/* ─── ボールを定期スポーン ──────────────── */
setInterval(() => {
  if (balls.filter(b => b.active).length < 4) {
    balls.push(new Ball());
  }
}, 2800);
balls.push(new Ball());

/* ─── ゲームループ ────────────────────── */
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* 背景グリッド（薄） */
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth   = 1;
  for (let gx = 0; gx < canvas.width; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke();
  }
  for (let gy = 0; gy < canvas.height; gy += 40) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
  }

  /* スポーン表示 */
  ctx.fillStyle   = 'rgba(255,255,255,0.15)';
  ctx.font        = '13px Arial';
  ctx.textAlign   = 'center';
  ctx.fillText('▼ ボール落下エリア ▼', canvas.width / 2, 20);
  ctx.textAlign   = 'left';

  drawLines();
  drawGoal();

  balls = balls.filter(b => b.active || b.y < canvas.height + 40);
  for (const b of balls) { b.update(); b.draw(); }

  updateParticles();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>

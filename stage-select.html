<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ステージ選択</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: #eef4ff;
      background: linear-gradient(135deg, #0a1320, #132d48);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .wrap {
      width: min(860px, 100%);
      background: rgba(8, 16, 30, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
    }
    h1 { font-size: 34px; margin-bottom: 8px; }
    p { color: #a4b7d2; margin-bottom: 18px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      min-height: 108px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 210, 76, 0.55);
      background: rgba(255, 210, 76, 0.08);
    }
    .card strong { color: #ffd24c; font-size: 20px; }
    .card span { color: #a4b7d2; font-size: 13px; }
    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 700;
    }
    .primary { background: #ffd24c; color: #241900; }
    .sub { background: rgba(255,255,255,0.08); color: #eef4ff; border: 1px solid rgba(255,255,255,0.08); }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>ステージ選択</h1>
    <p>ステージ説明カードをクリックすると、そのステージを直接開始します。全30ステージ対応。</p>

    <section class="grid" id="stageGrid"></section>

    <div class="btns">
      <a class="primary" href="ボール入れゲーム１.html">ゲームを始める</a>
      <a class="sub" href="shop.html">ショップへ</a>
      <a class="sub" href="index.html">ホームへ</a>
    </div>
  </main>

  <script>
    const ACTIVE_SLOT_KEY = 'ball-goal-active-slot';

    function getActiveSlot() {
      const raw = Number(localStorage.getItem(ACTIVE_SLOT_KEY));
      if (raw >= 1 && raw <= 3) return raw;
      localStorage.setItem(ACTIVE_SLOT_KEY, '1');
      return 1;
    }

    const stageGrid = document.getElementById('stageGrid');
    for (let stage = 1; stage <= 30; stage++) {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.stage = String(stage);
      card.innerHTML = `<strong>Stage ${stage}</strong><span>難易度: ${Math.min(10, Math.ceil(stage / 3))}/10</span>`;
      stageGrid.appendChild(card);
    }

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const stage = Number(card.dataset.stage);
        if (!Number.isInteger(stage)) return;
        const slot = getActiveSlot();
        window.location.href = `ボール入れゲーム１.html?stage=${stage}&slot=${slot}`;
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>クレジット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: #eef6ff;
      background: linear-gradient(145deg, #151129, #1d3553);
    }
    .box {
      width: min(760px, 100%);
      background: rgba(12, 14, 28, 0.76);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
    }
    h1 { font-size: 32px; margin-bottom: 14px; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #bcd0ea;
    }
    .row strong { color: #ffd24c; }
    .note {
      margin-top: 16px;
      color: #a6b7d0;
      line-height: 1.7;
      font-size: 14px;
    }
    .btns { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    a {
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: #ffd24c; color: #221800; }
    .sub { background: rgba(255,255,255,0.08); color: #eef6ff; border: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <main class="box">
    <h1>クレジット</h1>

    <div class="row"><span>ゲームデザイン</span><strong>U-sei Project</strong></div>
    <div class="row"><span>フロント実装</span><strong>HTML / CSS / JavaScript</strong></div>
    <div class="row"><span>ジャンル</span><strong>ライン誘導アクションパズル</strong></div>

    <p class="note">このページは拡張用のクレジットページです。必要なら更新履歴、バージョン情報、使用アセット表記などを追加できます。</p>

    <div class="btns">
      <a class="primary" href="index.html">ホームへ</a>
      <a class="sub" href="ボール入れゲーム１.html">ゲームへ</a>
      <a class="sub" href="shop.html">ショップへ</a>
    </div>
  </main>
</body>
</html>
